<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ca Sa Viuda - Restaurant</title>
    <style>
        body { 
            font-family: 'Georgia', 'Times New Roman', serif; 
            background-color: #FDFBF7; /* Fondo crema exacto de la carta física */
            color: #222222; 
            margin: 0; 
            padding: 20px 20px 80px 20px;
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
            margin-top: 10px;
        }

        /* Logo tipográfico fiel a la carta original */
        .logo-title {
            font-family: 'Georgia', serif;
            font-size: 2.8rem;
            color: #7A1C1D; /* Granate vino de Ca Sa Viuda */
            font-weight: bold;
            line-height: 1;
            margin: 0;
        }
        .logo-subtitle {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #333333;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .logo-tagline {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #666666;
            margin-top: 4px;
            text-transform: uppercase;
        }
        
        /* Banner especial de temporada */
        .special-banner {
            background: #7A1C1D;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .lang-selector { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }
        .lang-btn { 
            border: 1px solid #7A1C1D; 
            background: #ffffff; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.8rem; 
            color: #7A1C1D;
            font-family: sans-serif;
            transition: all 0.2s ease;
        }
        .lang-btn.active { 
            background: #7A1C1D; 
            color: #ffffff; 
        }
        
        .category { margin-bottom: 35px; }
        .category-title { 
            color: #7A1C1D; 
            padding-bottom: 4px; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid #7A1C1D;
        }

        .menu-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 18px; 
            align-items: flex-start; 
        }
        .item-info { flex-grow: 1; padding-right: 15px; }
        .item-name { 
            font-weight: bold; 
            font-size: 1.05rem; 
            color: #111111; 
            text-transform: UPPERCASE;
        }
        .item-desc { 
            font-size: 0.88rem; 
            color: #555555; 
            margin-top: 3px; 
            line-height: 1.2; 
            font-family: sans-serif;
        }
        .item-price { 
            font-weight: bold; 
            color: #111111; 
            white-space: nowrap; 
            font-size: 1.05rem; 
        }
        
        .item-allergens { margin-top: 4px; display: flex; gap: 4px; }
        .allergen-badge { background: #EFE8DC; padding: 1px 5px; border-radius: 3px; font-size: 0.8rem; }
        
        .loading {
            text-align: center;
            font-style: italic;
            color: #7A1C1D;
            padding: 40px;
            font-size: 1rem;
        }

        .footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #CCCCCC;
            text-align: center;
            font-size: 0.85rem;
            color: #444444;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-title">Ca Sa Viuda</div>
        <div class="logo-subtitle">RESTAURANT</div>
        <div class="logo-tagline">FOOD, DRINKS AND GOOD VIBES</div>
    </div>

    <!-- Banner especial (vigencia configurada por DD-MM-AAAA) -->
    <div id="specialBanner" class="special-banner">
        ¡DISPONIBLE CARTA ESPECIAL DE TEMPORADA!
    </div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="changeLang('es')">ES</button>
        <button class="lang-btn" onclick="changeLang('ca')">CA</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" onclick="changeLang('de')">DE</button>
        <button class="lang-btn" onclick="changeLang('it')">IT</button>
        <button class="lang-btn" onclick="changeLang('fr')">FR</button>
    </div>

    <div id="menuContainer" class="loading">Cargando menú...</div>

    <!-- Pie de página informativo -->
    <div class="footer" id="footerMsg">
        Servicio de terraza 0,30€ suplemento
    </div>

    <script>
        // =======================================================
        // REEMPLAZA ESTO CON EL ID DE TU ÚNICO ARCHIVO DE GOOGLE SHEETS
        const SHEET_ID = 'TU_ID_DE_GOOGLE_SHEETS_AQUI'; 
        // =======================================================
        
        let rawBaseMenu = [];
        let rawSpecialMenu = [];
        let currentLang = 'es';
        let isSpecialActive = false;

        const baseFooterMsg = "Servicio de terraza 0,30€ suplemento";

        const allergenIcons = {
            "gluten": "🌾", "lacteos": "🥛", "pescado": "🐟", "huevo": "🥚",
            "frutos_secos": "🥜", "crustaceos": "🦐", "moluscos": "🐚", 
            "mostaza": "🍯", "sesamo": "🌱", "soja": "🫘"
        };

        async function translateText(text, targetLang) {
            if (!text || targetLang === 'es') return text;
            try {
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=es&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
                const data = await response.json();
                return data[0][0][0];
            } catch (e) {
                return text;
            }
        }

        async function fetchSheetData(tabName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
            const response = await fetch(url);
            const csvText = await response.text();
            return parseCSV(csvText);
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace(/"/g, '').split(',');
            return lines.slice(1).filter(line => line.trim() !== '').map(line => {
                const data = line.replace(/"/g, '').split(',');
                let obj = {};
                headers.forEach((header, i) => {
                    obj[header.trim()] = data[i] ? data[i].trim() : '';
                });
                return obj;
            });
        }

        async function init() {
            try {
                const config = await fetchSheetData('Configuracion');
                const row = config[0];
                
                if (row && row['Activar Especial (SI/NO)'] && row['Activar Especial (SI/NO)'].toUpperCase() === 'SI') {
                    const hoyDate = new Date();
                    const dia = String(hoyDate.getDate()).padStart(2, '0');
                    const mes = String(hoyDate.getMonth() + 1).padStart(2, '0');
                    const anio = hoyDate.getFullYear();
                    const hoyFormateado = `${dia}-${mes}-${anio}`;

                    const start = row['Fecha Inicio (DD-MM-AAAA)'];
                    const end = row['Fecha Fin (DD-MM-AAAA)'];

                    const parseFecha = (str) => {
                        const [d, m, a] = str.split('-');
                        return new Date(a, m - 1, d);
                    };

                    const dateHoy = parseFecha(hoyFormateado);
                    const dateStart = parseFecha(start);
                    const dateEnd = parseFecha(end);

                    if (dateHoy >= dateStart && dateHoy <= dateEnd) {
                        isSpecialActive = true;
                        document.getElementById('specialBanner').style.display = 'block';
                    }
                }

                rawBaseMenu = await fetchSheetData('Menu_Base');
                
                if (isSpecialActive) {
                    try {
                        rawSpecialMenu = await fetchSheetData('Menu_Especial');
                    } catch (err) {
                        console.warn("No se pudo cargar la pestaña 'Menu_Especial'.");
                    }
                }

                await renderMenu();
            } catch (e) {
                console.error(e);
                document.getElementById('menuContainer').innerText = "Hubo un problema al cargar la carta. Por favor, recarga.";
            }
        }

        async function changeLang(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('menuContainer').innerHTML = '<div class="loading">Traduciendo menú...</div>';
            
            const footerElem = document.getElementById('footerMsg');
            footerElem.innerText = await translateText(baseFooterMsg, currentLang);

            await renderMenu();
        }

        async function renderMenu() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            const activeMenu = isSpecialActive ? [...rawSpecialMenu, ...rawBaseMenu] : rawBaseMenu;

            const categoriesMap = {};
            activeMenu.forEach(item => {
                if (!item.Categoría) return;
                if (!categoriesMap[item.Categoría]) {
                    categoriesMap[item.Categoría] = [];
                }
                categoriesMap[item.Categoría].push(item);
            });

            for (const catName in categoriesMap) {
                const translatedCategory = await translateText(catName, currentLang);
                
                let catHTML = `
                    <div class="category">
                        <h3 class="category-title">${translatedCategory}</h3>`;

                for (const item of categoriesMap[catName]) {
                    const correctionCol = `Corrección ${currentLang.toUpperCase()}`;
                    
                    let name = item[correctionCol] || '';
                    let desc = '';

                    if (currentLang === 'es') {
                        name = item.Plato;
                        desc = item.Descripción;
                    } else {
                        if (!name) name = await translateText(item.Plato, currentLang);
                        desc = item[correctionCol] || await translateText(item.Descripción, currentLang);
                    }

                    let allergensHTML = '';
                    if (item.Alérgenos) {
                        allergensHTML = `<div class="item-allergens">`;
                        const list = item.Alérgenos.split(',').map(a => a.trim().toLowerCase());
                        list.forEach(alg => {
                            const icon = allergenIcons[alg];
                            if (icon) {
                                allergensHTML += `<span class="allergen-badge" title="${alg}">${icon}</span>`;
                            }
                        });
                        allergensHTML += `</div>`;
                    }

                    catHTML += `
                        <div class="menu-item">
                            <div class="item-info">
                                <div class="item-name">${name}</div>
                                <div class="item-desc">${desc || ''}</div>
                                ${allergensHTML}
                            </div>
                            <div class="item-price">${item.Precio}€</div>
                        </div>`;
                }

                catHTML += `</div>`;
                container.innerHTML += catHTML;
            }
        }

        init();
    </script>
</body>
</html>
